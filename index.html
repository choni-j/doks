<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5b4bff" />
  <meta name="description" content="독스 우수서평 투표" />
  <title>독스 우수서평 투표</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">


    <main id="app" class="app-main" aria-live="polite"></main>
  </div>

  <div id="countdownOverlay" class="countdown-overlay is-hidden" role="dialog" aria-modal="true" aria-label="다음 투표자 준비">
    <div class="countdown-card">
      <div class="countdown-label">선택 완료</div>
      <div id="countdownNumber" class="countdown-number">3</div>
      <p id="countdownMessage">다음 사람에게 기기를 넘겨주세요</p>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
