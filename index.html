<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5b4bff" />
  <meta name="description" content="독스 우수서평 투표" />
  <title>독스 우수서평 투표</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
<meta property="og:type" content="website">

<meta property="og:title" content="독스 우수서평 투표">

<meta

  property="og:description"

  content="독스 우수서평 투표 페이지입니다."

>

<meta

  property="og:url"

  content="https://choni-j.github.io/doks/"

>

<meta

  property="og:image"

  content="https://choni-j.github.io/doks/B27349BA-EF01-4325-A6CE-7EFBACCD3DA9.png"

>

<meta property="og:image:type" content="image/png">

<meta property="og:image:width" content="1200">

<meta property="og:image:height" content="630">


</head>
<body>
  <div class="app-shell">


   <header class="topbar">
      <button id="homeButton" class="icon-button is-hidden" type="button" aria-label="처음으로">←</button>
      <div class="brand">독스 투표</div>
      <button id="resetButton" class="text-button is-hidden" type="button">초기화</button>
  

     
    </header> 
    <main id="app" class="app-main" aria-live="polite"></main>
  </div>

  <div id="countdownOverlay" class="countdown-overlay is-hidden" role="dialog" aria-modal="true" aria-label="다음 투표자 준비">
    <div class="countdown-card">
      <div class="countdown-label">선택 완료</div>
      <div id="countdownNumber" class="countdown-number">3</div>
      <p id="countdownMessage">다음 사람에게 기기를 넘겨주세요</p>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
